name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: TheLitis
          filename: metrics.overview.svg
          config_display: large
          config_timezone: Europe/Moscow
          base: header, activity, community, repositories, metadata

          plugin_habits: yes
          plugin_habits_from: 400
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 6
          plugin_habits_languages_threshold: 2%

      - name: Notable organization contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: TheLitis
          filename: metrics.notable.svg
          base: ""
          config_display: large

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit, pull_request
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_self: no

      - name: Featured and affiliated repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: TheLitis
          filename: metrics.repositories.svg
          base: ""
          config_display: large

          plugin_repositories: yes
          plugin_repositories_order: featured, pinned
          plugin_repositories_featured: >-
            TheLitis/AGI,
            Inter-Knot-Arena/Inter-Knot-Arena-WEB,
            Inter-Knot-Arena/Inter-Knot-Arena-CV,
            Inter-Knot-Arena/Inter-Knot-Arena-OCR_Scan,
            Inter-Knot-Arena/Inter-Knot-Arena-VerifierApp
          plugin_repositories_affiliations: owner, collaborator, organization_member
